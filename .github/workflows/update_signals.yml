name: Update Stock Signals

on:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  update-signals:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Important: fetch full history so we can push back
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # caching pip dependencies
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f stock_monitor_app/requirements.txt ]; then pip install -r stock_monitor_app/requirements.txt; fi
        
    - name: Run headless update script
      working-directory: stock_monitor_app
      run: python update_signals.py
      
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add stock_monitor_app/signal_history/
        # Only commit if there are changes
        git diff --staged --quiet || (git commit -m "Auto-update signal snapshots" && git push)
