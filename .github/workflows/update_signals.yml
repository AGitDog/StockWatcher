name: Update Stock Signals

on:
  schedule:
    # Run once every 24 hours at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  update-signals:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required to push signal_history/ back to repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Important: fetch full history so we can push back
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run headless update script
      env:
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      run: python update_signals.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add signal_history/
        # Only commit if there are changes
        git diff --staged --quiet || (git commit -m "Auto-update signal snapshots" && git push)
